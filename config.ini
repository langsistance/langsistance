[MAIN]
is_local = False
; ===== LLM Provider Toggle =====
; Switch provider by uncommenting the desired provider+model pair:
;provider_name = deepseek
;provider_model = deepseek-v4-flash
;provider_name = openai
;provider_model = gpt-4o-mini
;provider_name = qwen
;provider_model = qwen3.5-flash
;provider_name = minimax
;provider_model = MiniMax-M2.7-highspeed
provider_name = openrouter
provider_model = openai/gpt-5.4-mini
provider_server_address = 127.0.0.1:11434
agent_name = Jarvis
recover_last_session = False
save_session = False
speak = False
listen = False
jarvis_personality = False
languages = en

[BROWSER]
headless_browser = True
stealth_mode = False

[EMBEDDING]
; Embedding provider: siliconflow | openai
; SiliconFlow uses BAAI/bge-large-zh-v1.5, ¥0.0005/1K tokens, China-accessible
provider = siliconflow
model = BAAI/bge-m3
;provider = openai
;model = text-embedding-3-small
; Optional: override via environment variables EMBEDDING_PROVIDER, EMBEDDING_MODEL, EMBEDDING_API_KEY, EMBEDDING_BASE_URL

[PATENT]
; ===== DI 开放平台 OAuth 配置 =====
; 在 DI 开放平台 (open.zldsj.com) 注册应用后获取
; 也可通过环境变量 PATENT_CLIENT_ID / PATENT_CLIENT_SECRET 覆盖
client_id =
client_secret =
; DI 平台 refresh_token 接口地址
refresh_url = https://open.zldsj.com/oauth/token

[LONG_TASK]
provider_family = deepseek
max_patents = 20

[STORAGE]
backend = cos
; --- Local (fallback) ---
local_base_dir = /opt/workspace/reports
; --- Tencent COS ---
; 也可通过环境变量覆盖: COS_REPORT_BUCKET / COS_SECRET_ID / COS_SECRET_KEY / COS_REGION
cos_bucket = copiioai-reports-1354913476
cos_region = ap-hongkong
cos_secret_id =
cos_secret_key =
cos_prefix = reports